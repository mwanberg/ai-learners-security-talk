# .github/workflows/deploy-slides.yml
# Builds Marp slides to HTML and deploys to GitHub Pages
name: Deploy Slides

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Marp CLI
        run: npm install -g @marp-team/marp-cli

      - name: Build HTML slides
        run: marp slides.md -o dist/index.html --html false

      - name: Build PDF
        run: marp slides.md -o dist/slides.pdf --html false --pdf --allow-local-files

      - name: Copy assets to dist
        run: |
          cp -r images dist/images
          cp -r fonts dist/fonts

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
